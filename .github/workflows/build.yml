name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-ios:
    name: Build ${{ matrix.app }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        app:
          - Verse
          - Tone
          - PhotosOrganizer
          - AmbientLight
          - HearAugment
          - PolyReader
          - VoiceRecorder
          - HelloWorld
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies with Tuist
        run: tuist install

      - name: Generate Xcode workspace with Tuist
        run: tuist generate --no-open

      - name: Build ${{ matrix.app }}
        run: |
          set -o pipefail && xcodebuild \
            -workspace MuApps.xcworkspace \
            -scheme ${{ matrix.app }} \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipMacroValidation \
            build | xcbeautify --renderer github-actions
