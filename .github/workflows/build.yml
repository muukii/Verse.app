name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies with Tuist
        run: tuist install

      - name: Generate Xcode workspace with Tuist
        run: tuist generate --no-open

      - name: Build iOS
        run: |
          set -o pipefail && xcodebuild \
            -workspace MuApps.xcworkspace \
            -scheme Verse \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipMacroValidation \
            build | xcbeautify --renderer github-actions
