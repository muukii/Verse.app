<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Install Verse</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: Canvas;
        color: CanvasText;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(100% - 48px, 420px);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 28px;
        color: color-mix(in srgb, CanvasText 68%, Canvas);
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        width: min(100%, 260px);
        border-radius: 8px;
        background: #007aff;
        color: white;
        font-weight: 700;
        text-decoration: none;
      }

      a:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Verse</h1>
      <p>Install the latest Ad Hoc build on a registered iPhone.</p>
      <a href="itms-services://?action=download-manifest&amp;url=https%3A%2F%2Fgithub.com%2Fmuukii%2FMuApps%2Freleases%2Fdownload%2Fadhoc-latest%2Fmanifest.plist">Install</a>
    </main>
  </body>
</html>
